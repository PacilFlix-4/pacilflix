<!DOCTYPE html>
<html>
<head>
    <title>Ulasan</title>
    <style>
        .review-section {
            color: white;
            padding: 20px;
            max-width: 800px;
            margin: 40px auto;
            background-color: #333;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .review-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .review-form input[type="text"],
        .review-form input[type="number"] {
            flex: 1 1 auto;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-right: 5px;
            min-width: 150px;
        }

        .review-form input[type="submit"] {
            padding: 10px 15px;
            background-color: #e50914;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .review-form input[type="submit"]:hover {
            background-color: #f63a0f;
        }

        .review-list {
            list-style-type: none;
            padding-left: 0;
        }

        .review-list li {
            background: #424242;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        .review-list li:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .review-rating {
            font-size: 0.8em;
            color: #ccc;
            margin-top: 5px;
        }
    </style>
</head>

{% block content %}
<body>
    <div class="container">
        <center><h1>Ulasan {{ judul.1 }}</h1></center>
        <div class="review-form">
            <h2>Beri ulasan</h2>
            <form id="reviewForm" method="post" action="{% url 'ulasan:submit_ulasan' judul.0 %}">
                {% csrf_token %}
                <div class="form-row">
                    <label for="rating">Rating (1-5):</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" required>
                </div>
                <div class="form-row">
                    <label for="deskripsi">Ulasan:</label>
                    <textarea id="deskripsi" name="deskripsi" rows="4" required></textarea>
                </div>
                <center><input type="submit" value="Submit"></center>
            </form>
        </div>

        <div class="review-list">
            <h2>Ulasan</h2>
            <ul id="reviews">
            </ul>
        </div>

        {% for ulasan in ulasans %}
        <div class="ulasan-card">
            <div class="ulasan-header">
                <span class="username">{{ ulasan.1 }}</span>
                <span class="timestamp">{{ ulasan.2 }}</span>
            </div>
            <div class="rating">{{ ulasan.3 }}/5</div>
            <div class="description">
                "{{ ulasan.4 }}"
            </div>
        </div>
        {% endfor %}

    </div>
</body>
{% endblock content %}
